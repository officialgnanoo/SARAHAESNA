<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بصراحة</title>
</head>
<body>
<script>
  // هذا الملف بيشتغل تلقائيًا لما حد يفتح رابط زي:
  // https://officialgnanoo.github.io/SARAHAESNA/ahmed
  // لأن GitHub Pages مش بيلاقي ملف حقيقي اسمه "ahmed"، فبيجيب صفحة 404 دي بدل منه،
  // وهي بتاخد اسم المستخدم من الرابط وتوديه على index.html عشان يعرضله صفحة الإرسال.
  (function () {
    var path = window.location.pathname; // مثال: /SARAHAESNA/ahmed
    var parts = path.split('/').filter(Boolean); // ["SARAHAESNA", "ahmed"]

    if (parts.length >= 2) {
      var repoBase = '/' + parts[0] + '/'; // "/SARAHAESNA/"
      var username = parts[parts.length - 1];
      window.location.replace(repoBase + 'index.html?u=' + encodeURIComponent(username));
    } else if (parts.length === 1) {
      window.location.replace('/' + parts[0] + '/index.html');
    } else {
      window.location.replace('/index.html');
    }
  })();
</script>
</body>
</html>
